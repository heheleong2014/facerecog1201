<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Biometric Portal</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h2, h3, h4 {
            margin-bottom: 10px;
        }
        #status {
            background: #222;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
        video {
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            border: 2px solid #00ffcc;
            background: #000;
            transform: scaleX(-1);
        }
        .btn {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #00b38f;
        }
        .btn-admin {
            background: #555;
            color: #fff;
        }
        .btn-admin:hover {
            background: #777;
        }
        #admin-panel {
            display: none;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            width: 100%;
            max-width: 460px;
            border: 1px solid #444;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 6px;
            box-sizing: border-box;
        }
        ul {
            list-style-type: none;
            padding: 0;
            max-height: 150px;
            overflow-y: auto;
        }
        li {
            background: #2a2a2a;
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
    
    <!-- Load Face-API.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
</head>
<body>

    <h2>AI Biometric Portal</h2>
    <div id="status">Loading AI Models...</div>
    <video id="video" autoplay muted playsinline></video>

    <br>
    <button class="btn btn-admin" onclick="toggleAdmin()">Admin Console</button>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <h3>Admin Console</h3>
        <label>Enter Password:</label>
        <input type="password" id="admin-pass">
        <button class="btn" onclick="verifyAdmin()">Login</button>
        
        <div id="admin-content" style="display:none; margin-top:20px;">
            <h4>Register New Face</h4>
            <input type="text" id="new-name" placeholder="Enter Name">
            <button class="btn" onclick="registerFace()">Scan & Save to Cloud</button>
            
            <h4>Live Cloud Access Logs</h4>
            <ul id="log-list"></ul>
        </div>
    </div>

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Global variables for Supabase Configuration
        const SUPABASE_URL = "https://knkojtcujkltqubunsfr.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtua29qdGN1amtsdHF1YnVuc2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1MzU5MTcsImV4cCI6MjEwMDExMTkxN30.oeRqucu4LLgtOeFkp2wyK2Od-weoJWb05o4ridgl8w4";

        // Initialize Supabase Client with safe naming variable
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        let modelsLoaded = false;
        let isAdminLoggedIn = false;

        // Start App
        async function init() {
            try {
                // Fixed syntax errors, quote mismatches, and parenthesis bugs here
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                await faceapi.nets.faceLandmarks68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                
                modelsLoaded = true;
                statusDiv.innerText = "AI Models Ready. Starting Camera...";
                startVideo();
            } catch (e) {
                statusDiv.innerText = "Error loading AI models.";
                console.error(e);
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(stream => {
                    video.srcObject = stream;
                    statusDiv.innerText = "Scanning for faces...";
                    setInterval(scanFace, 2000); // Scan every 2 seconds
                })
                .catch(err => {
                    statusDiv.innerText = "Camera access denied.";
                    console.error(err);
                });
        }

        // Scan and Verify Face against Cloud
        async function scanFace() {
            if (!modelsLoaded) return;

            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if (!detection) {
                statusDiv.innerText = "No face detected. Adjust lighting.";
                return;
            }

            statusDiv.innerText = "Face detected! Matching with database...";
            
            try {
                // Fetch profiles from Supabase database
                const { data: profiles, error } = await _supabase.from('profiles').select('*');
                
                if (error) throw error;

                let matchFound = false;
                let matchedName = "";

                if (profiles && profiles.length > 0) {
                    for (let profile of profiles) {
                        const savedDescriptor = new Float32Array(JSON.parse(profile.descriptor));
                        const distance = faceapi.euclideanDistance(detection.descriptor, savedDescriptor);
                        
                        // Distance lower than 0.6 indicates a reliable match
                        if (distance < 0.6) {
                            matchFound = true;
                            matchedName = profile.name;
                            break;
                        }
                    }
                }

                if (matchFound) {
                    statusDiv.innerText = `Access Granted: Welcome, ${matchedName}!`;
                    statusDiv.style.color = "#00ffcc";
                    await logAccess(matchedName, "Access Granted");
                } else {
                    statusDiv.innerText = "Access Denied: Unknown User.";
                    statusDiv.style.color = "#ff3333";
                    await logAccess("Unknown", "Access Denied");
                }
            } catch (err) {
                console.error("Database connection error:", err);
                statusDiv.innerText = "Database connection failed.";
            }
        }

        // Log entry data to Supabase
        async function logAccess(name, status) {
            try {
                await _supabase.from('logs').insert([{ name: name, status: status, timestamp: new Date() }]);
                if (isAdminLoggedIn) fetchLogs();
            } catch (err) {
                console.error("Failed to push log data:", err);
            }
        }

        // Admin Panel Controls
        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function verifyAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === "admin123") {
                isAdminLoggedIn = true;
                document.getElementById('admin-content').style.display = 'block';
                alert("Login successful!");
                fetchLogs();
            } else {
                alert("Incorrect password!");
            }
        }

        // Register Face Workflow
        async function registerFace() {
            if (!modelsLoaded) return alert("AI models are still loading.");
            const name = document.getElementById('new-name').value;
            if (!name) return alert("Please enter a name first.");

            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if (!detection) return alert("Could not capture face. Look directly at the camera.");

            try {
                const descriptorString = JSON.stringify(Array.from(detection.descriptor));
                const { error } = await _supabase.from('profiles').insert([{ name: name, descriptor: descriptorString }]);
                
                if (error) throw error;
                
                alert(`Successfully registered ${name} to the cloud!`);
                document.getElementById('new-name').value = "";
            } catch (err) {
                console.error(err);
                alert("Failed to save data to Supabase.");
            }
        }

        // Fetch logs data for display
        async function fetchLogs() {
            try {
                const { data: logs, error } = await _supabase.from('logs').select('*').order('timestamp', { ascending: false }).limit(10);
                if (error) throw error;

                const logList = document.getElementById('log-list');
                logList.innerHTML = "";
                if (logs) {
                    logs.forEach(log => {
                        const li = document.createElement('li');
                        const timeStr = new Date(log.timestamp).toLocaleTimeString();
                        li.innerText = `[${timeStr}] ${log.name} - ${log.status}`;
                        logList.appendChild(li);
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Fire application initializing setup
        init();
    </script>
</body>
</html>
