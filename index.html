<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Portal</title>
    <!-- face-api.js for AI Face Tracking -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <!-- Supabase Library for Cloud Sync -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        video { width: 100%; max-width: 500px; border-radius: 10px; background: #222; transform: scaleX(-1); }
        .btn { background: #0070f3; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 10px; }
        .btn-admin { background: #333; }
        #status { font-size: 18px; margin: 15px 0; font-weight: bold; }
        #admin-panel { display: none; background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 500px; margin: 20px auto; text-align: left; }
        ul { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        li { padding: 8px; border-bottom: 1px solid #333; font-size: 14px; }
        .success { color: #00ff88; }
        .fail { color: #ff3b30; }
    </style>
</head>
<body>

    <h2>AI Biometric Portal</h2>
    <div id="status">Loading AI Models...</div>
    <video id="video" autoplay muted playsinline></video>
    
    <br>
    <button class="btn btn-admin" onclick="toggleAdmin()">Admin Console</button>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <h3>Admin Console</h3>
        <label>Enter Password:</label>
        <input type="password" id="admin-pass" style="width:100%; padding:8px; margin:8px 0; background:#333; color:white; border:1px solid #555;">
        <button class="btn" onclick="verifyAdmin()">Login</button>
        
        <div id="admin-content" style="display:none; margin-top:20px;">
            <h4>Register New Face</h4>
            <input type="text" id="new-name" placeholder="Enter Name" style="width:100%; padding:8px; background:#333; color:white; border:1px solid #555;">
            <button class="btn" onclick="registerFace()">Scan & Save to Cloud</button>
            
            <h4>Live Cloud Access Logs</h4>
            <ul id="log-list"></ul>
        </div>
    </div>

    <script>
        // 
        const SUPABASE_URL = "https://knkojtcujkltqubunsfr.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtua29qdGN1amtsdHF1YnVuc2ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1MzU5MTcsImV4cCI6MjEwMDExMTkxN30.oeRqucu4LLgtOeFkp2wyK2Od-weoJWb05o4ridgl8w4";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        let modelsLoaded = false;
        let isAdminLoggedIn = false;

        // Start App
        async function init() {
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                modelsLoaded = true;
                statusDiv.innerText = "AI Models Ready. Starting Camera...";
                startVideo();
            } catch (e) {
                statusDiv.innerText = "Error loading AI models.";
                console.error(e);
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(stream => {
                    video.srcObject = stream;
                    statusDiv.innerText = "Scanning for faces...";
                    setInterval(scanFace, 2000); // Scan every 2 seconds
                })
                .catch(err => {
                    statusDiv.innerText = "Camera access denied.";
                });
        }

        // Scan and Verify Face against Cloud
        async function scanFace() {
            if (!modelsLoaded) return;
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if (!detection) {
                statusDiv.innerHTML = "Searching for face...";
                return;
            }

            // Fetch latest math patterns from Supabase cloud
            const { data: users, error } = await supabase.from('authorized_users').select('*');
            if (error || !users || users.length === 0) {
                statusDiv.innerHTML = "<span class='fail'>Access Denied: No users registered</span>";
                return;
            }

            let bestMatch = { name: "Unknown", distance: 1.0 };
            
            users.forEach(user => {
                // Convert stored array back to Float32Array for face-api
                const storedDescriptor = new Float32Array(user.descriptor);
                const distance = faceapi.euclideanDistance(detection.descriptor, storedDescriptor);
                if (distance < distanceThreshold && distance < bestMatch.distance) {
                    bestMatch = { name: user.name, distance: distance };
                }
            });

            const distanceThreshold = 0.5; // Lower = stricter security
            if (bestMatch.distance < distanceThreshold) {
                statusDiv.innerHTML = `<span class='success'>Welcome, ${bestMatch.name}! Access Granted</span>`;
                logAccess(bestMatch.name, "GRANTED");
            } else {
                statusDiv.innerHTML = "<span class='fail'>Access Denied: Unauthorized Face</span>";
                logAccess("Unknown Person", "DENIED");
            }
        }

        // Register Face (Upload 128 Numbers to Cloud)
        async function registerFace() {
            const nameInput = document.getElementById('new-name').value.trim();
            if (!nameInput) return alert("Enter a name first!");

            statusDiv.innerText = "Analyzing face geometry...";
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

            if (!detection) {
                alert("No face detected! Look directly at the camera and try again.");
                statusDiv.innerText = "Scanning...";
                return;
            }

            // Convert Float32Array to standard array for database storage
            const descriptorArray = Array.from(detection.descriptor);

            const { error } = await supabase
                .from('authorized_users')
                .upsert({ name: nameInput, descriptor: descriptorArray });

            if (error) {
                alert("Cloud upload failed: " + error.message);
            } else {
                alert(`Successfully synced ${nameInput}'s face template to the cloud!`);
                document.getElementById('new-name').value = "";
                loadLogs();
            }
        }

        // Log actions to Supabase cloud
        async function logAccess(name, status) {
            await supabase.from('access_logs').insert({ name: name, status: status });
            if (isAdminLoggedIn) loadLogs();
        }

        // Admin Actions
        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function verifyAdmin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === "1234") { // Replace "1234" with your personal master password
                isAdminLoggedIn = true;
                document.getElementById('admin-content').style.display = 'block';
                loadLogs();
            } else {
                alert("Incorrect password!");
            }
        }

        async function loadLogs() {
            const { data: logs, error } = await supabase.from('access_logs').select('*').order('created_at', { ascending: false }).limit(20);
            if (error) return;
            
            const list = document.getElementById('log-list');
            list.innerHTML = "";
            logs.forEach(log => {
                const li = document.createElement('li');
                const time = new Date(log.created_at).toLocaleTimeString();
                li.innerHTML = `[${time}] <b>${log.name}</b> - <span class="${log.status === 'GRANTED' ? 'success' : 'fail'}">${log.status}</span>`;
                list.appendChild(li);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
